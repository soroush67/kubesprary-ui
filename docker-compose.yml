services:
  webui:
    build: .
    ports:
      - "8420:8420"
    volumes:
      - ../kubespray:/kubespray
      - /var/run/docker.sock:/var/run/docker.sock
      # Publickey auth for the Installation tab's real cluster.yml runs -
      # same SSH_DIR the backup-sync service already uses below.
      - ${SSH_DIR:-/home/soroush/.ssh}:/root/.ssh:ro
    environment:
      - KUBESPRAY_ROOT=/kubespray
      # Real host-side path to the kubespray checkout. Needed because `docker run -v`
      # commands issued from inside this container (via the socket mount above) are
      # resolved by the HOST's daemon against HOST paths, not this container's - so
      # any bind-mount source built from KUBESPRAY_ROOT alone would silently mount an
      # empty directory instead of the real checkout. See offline.py.
      - HOST_KUBESPRAY_ROOT=/home/soroush/infra/kubespray
    restart: unless-stopped

  # These four are the "Offline / Air-gapped" tab's repos: permanent, always
  # running, empty until the tab's Run buttons fill them in. They serve straight
  # off the same host directories the webui downloads into, resolved by
  # docker-compose itself against the host filesystem (unlike anything the webui
  # container starts via its own `docker run` - see HOST_KUBESPRAY_ROOT above).
  #
  # All three mount their data straight onto /usr/share/nginx/html and override
  # /etc/nginx/conf.d/default.conf (the exact path nginx:alpine's own stock config
  # lives at) with nginx-autoindex.conf - mounting kubespray's own contrib/offline/
  # nginx.conf at /etc/nginx/nginx.conf instead (the first thing tried here) does
  # NOT work: that stock default.conf is still `include`'d alongside it and, for
  # any request with a plain "Host: localhost" header (i.e. any browser/curl
  # hitting these by IP or "localhost"), nginx picks IT over the intended config
  # (more specific server_name: "localhost" beats kubespray's catch-all "_") -
  # silently serving from the wrong root with no autoindex. Overriding
  # default.conf directly sidesteps the conflict entirely.
  offline-files:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ../kubespray/contrib/offline/offline-files:/usr/share/nginx/html:ro
      - ./nginx-autoindex.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  offline-apt:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - ../kubespray/contrib/offline/os-packages:/usr/share/nginx/html:ro
      - ./nginx-autoindex.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  offline-pip:
    image: nginx:alpine
    ports:
      - "8082:80"
    volumes:
      - ../kubespray/contrib/offline/pip-packages:/usr/share/nginx/html:ro
      - ./nginx-autoindex.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  offline-registry:
    image: registry:2
    ports:
      - "5000:5000"
    volumes:
      - offline_registry_data:/var/lib/registry
    restart: unless-stopped

  rustfs:
    image: rustfs/rustfs:latest
    security_opt:
      - "no-new-privileges:true"
    ports:
      - "9000:9000" # S3 API port
      - "9001:9001" # Console port
    environment:
      - RUSTFS_VOLUMES=/data/rustfs{0...3}
      - RUSTFS_ADDRESS=0.0.0.0:9000
      - RUSTFS_CONSOLE_ADDRESS=0.0.0.0:9001
      - RUSTFS_CONSOLE_ENABLE=true
      - RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS=*
      # SECURITY: these defaults are public and well-known - set real values in .env
      # before exposing this beyond localhost.
      - RUSTFS_ACCESS_KEY=${RUSTFS_ACCESS_KEY:-rustfsadmin}
      - RUSTFS_SECRET_KEY=${RUSTFS_SECRET_KEY:-rustfsadmin}
      - RUSTFS_OBS_LOGGER_LEVEL=info
      # This host has a single physical disk, so the 4 data volumes below
      # can't satisfy RustFS's erasure-coding "distinct physical disks" check.
      # Only bypass this on single-disk boxes; remove it on real multi-disk hardware.
      - RUSTFS_UNSAFE_BYPASS_DISK_CHECK=true
    volumes:
      - rustfs_data_0:/data/rustfs0
      - rustfs_data_1:/data/rustfs1
      - rustfs_data_2:/data/rustfs2
      - rustfs_data_3:/data/rustfs3
      - rustfs_logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  rustfs-volume-permission-helper:
    image: alpine
    volumes:
      - rustfs_data_0:/data0
      - rustfs_data_1:/data1
      - rustfs_data_2:/data2
      - rustfs_data_3:/data3
      - rustfs_logs:/logs
    command: >
      sh -c "
        chown -R 10001:10001 /data0 /data1 /data2 /data3 /logs &&
        echo 'Volume permissions fixed'
      "
    restart: "no"

  backup-sync:
    build: ./backup-sync
    depends_on:
      - rustfs
    environment:
      - INVENTORY_NAME=${BACKUP_INVENTORY_NAME:-local}
      - SYNC_INTERVAL_SECONDS=${BACKUP_SYNC_INTERVAL_SECONDS:-900}
      - RUSTFS_ENDPOINT=http://rustfs:9000
      - RUSTFS_ACCESS_KEY=${RUSTFS_ACCESS_KEY:-rustfsadmin}
      - RUSTFS_SECRET_KEY=${RUSTFS_SECRET_KEY:-rustfsadmin}
      - RUSTFS_BUCKET=etcd-backups
      - ETCD_BACKUP_PREFIX=${ETCD_BACKUP_PREFIX:-/var/backups}
      - KUBESPRAY_ROOT=/kubespray
    volumes:
      - ../kubespray:/kubespray:ro
      - ${SSH_DIR:-/home/soroush/.ssh}:/root/.ssh:ro
    restart: unless-stopped

volumes:
  rustfs_data_0:
  rustfs_data_1:
  rustfs_data_2:
  rustfs_data_3:
  rustfs_logs:
  offline_registry_data:
